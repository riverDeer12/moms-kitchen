<div class="container-fluid">
  <div @fadeInAnimation class="container mb-5">
    <h2><i class="fa fa-envelope text-danger"></i> Feel free to contact us</h2>
    <div class="container mt-5">
      <form [formGroup]="emailForm" autocomplete="off" (submit)="sendEmail()">
        <div class="row">
          <div class="col-md-6">
            <div class="form-group">
              <label>Email</label>
              <input type="text" class="form-control" formControlName="email"
                placeholder="enter your email contact here...">
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-md-6">
            <div class="form-group">
              <label>Subject</label>
              <input type="text" class="form-control" formControlName="subject"
                placeholder="enter your subject here...">
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-md-6">
            <div class="form-group">
              <label>Description</label>
              <textarea class="form-control" formControlName="description"
                placeholder="enter your questions or suggestions here..."></textarea>
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-md-6 text-center">
            <button [disabled]="this.emailForm.invalid" type="submit" class="btn btn-primary btn-block">
              Send email <i class="nc-icon nc-email-85 ml-2"></i></button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
