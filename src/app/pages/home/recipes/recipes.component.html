<form [formGroup]="filterForm" autocomplete="off" (submit)="filterRecipes()">
  <div class="row">
    <div class="col-md-4 pr-1">
      <div class="form-group">
        <label>Keyword</label>
        <input type="text" class="form-control" formControlName="keyword" placeholder="enter keyword here...">
      </div>
    </div>
    <div class="col-md-4 pr-1">
      <div class="form-group">
        <label>From</label>
        <p-calendar formControlName="from"></p-calendar>
      </div>
    </div>
  </div>
  <div class="col-md-4 pr-1">
    <div class="form-group">
      <label>To</label>
      <p-calendar formControlName="to"></p-calendar>
    </div>
  </div>
  <div class="row">
    <div class="col-md-6">
      <button type="submit" class="btn btn-primary btn-primary">
        Search recipes<i class="nc-icon nc-zoom-split ml-2"></i></button>
    </div>
  </div>
</form>

<div class="row" *ngIf="loadingData">
  <span class="col-md-3 mt-5">
    Loading recipes...
  </span>
</div>

<div class="row recipes-container" *ngIf="!loadingData">
  <div class="col-md-3 mt-5" *ngFor="let recipe of recipes">
    <app-recipe-card [recipe]="recipe"></app-recipe-card>
  </div>
</div>
