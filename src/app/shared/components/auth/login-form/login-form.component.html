<form [formGroup]="loginForm" autocomplete="off" (submit)="login()">
  <div class="row">
    <div class="col-md-6 pr-1">
      <div class="form-group">
        <label>Username</label>
        <input type="text" class="form-control" formControlName="username" placeholder="enter your username here...">
      </div>
    </div>
  </div>
  <div class="row">
    <div class="col-md-6 pr-1">
      <div class="form-group">
        <label>Password</label>
        <input type="password" class="form-control" formControlName="password" placeholder="enter your password here...">
      </div>
    </div>
  </div>
  <div class="row">
    <div class="col-md-6">
      <button type="submit" class="btn btn-primary btn-primary">Login</button>
    </div>
  </div>
</form>
