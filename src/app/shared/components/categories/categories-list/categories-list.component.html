<a [href]="'/categories/create'" class="btn btn-info float-right">
    Create new category
</a>

<table class="table">
    <thead>
        <tr>
            <th>Name</th>
            <th>Job Position</th>
            <th>Since</th>
            <th class="text-right">Salary</th>
            <th class="text-center"></th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>John Doe</td>
            <td>Design</td>
            <td>2012</td>
            <td class="text-right">&euro; 89,241</td>
            <td class="td-actions text-center">
                <button type="button" rel="tooltip" class="btn btn-info btn-sm btn-round btn-icon">
                    <i class="fa fa-info"></i>
                </button>
                <button type="button" rel="tooltip" class="btn btn-success btn-sm btn-round btn-icon">
                    <i class="fa fa-edit"></i>
                </button>
                <button type="button" rel="tooltip" class="btn btn-danger btn-sm btn-round btn-icon">
                    <i class="fa fa-times"></i>
                </button>
            </td>
        </tr>
    </tbody>
</table>
