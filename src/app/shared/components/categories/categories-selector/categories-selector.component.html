<div class="row" *ngIf="loadingData">
  <span class="col-md-3 mt-5">
    Loading categories...
  </span>
</div>

<form *ngIf="!loadingData" [formGroup]="parentForm">
  <p-multiSelect 
    class="form-control multiselect" 
    [options]="categories" 
    formControlName="categories" 
    defaultLabel="select categories..." 
    optionLabel="name"
    optionValue="id"
    display="chip"></p-multiSelect>
</form>
