<form [formGroup]="createForm" (submit)="submit()">
  <div class="row">
    <div class="col-md-6 pr-1">
      <div class="form-group">
        <label>Name</label>
        <input type="text" class="form-control" placeholder="enter category name here..." formControlName="name">
      </div>
    </div>
  </div>
  <div class="row">
    <div class="col-md-6 pr-1">
      <div class="form-group">
        <label>Description</label>
        <textarea class="form-control" 
          placeholder="enter category description here..." 
          formControlName="description">
        </textarea>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="col-md-6">
      <button type="submit" class="btn btn-primary btn-success">Save</button>
    </div>
  </div>
</form>
