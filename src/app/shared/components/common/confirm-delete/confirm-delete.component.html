<div class="modal-header">
  <h4 class="modal-title">Please confirm deletion</h4>
  <button type="button" class="close" aria-label="Close" (click)="activeModal.dismiss()">
    <span aria-hidden="true">&times;</span>
  </button>
</div>
<div class="modal-footer">
  <button type="button" class="btn btn-primary btn-danger" (click)="activeModal.close()">Close</button>
  <button type="button" class="btn btn-primary btn-success" (click)="confirm()">Confirm</button>
</div>
