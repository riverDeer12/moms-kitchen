<div *ngIf="!loadingData" class="info">
  <h4 class="info-title">
    {{complexityLevel.name}}
  </h4>
  <p>
    <label>Status: </label>
    {{complexityLevel.getStatus()}}
  </p>
  <p>
    <label>Complexity Weight: </label>
    {{complexityLevel.complexityWeight}}
  </p>
  <p>
    <label>Description: </label>
    <span [innerHtml]="complexityLevel.description"></span>
  </p>
</div>
