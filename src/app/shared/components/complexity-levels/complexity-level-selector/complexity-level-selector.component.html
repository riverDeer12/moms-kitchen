<div class="row" *ngIf="loadingData">
  <span class="col-md-3 mt-5">
    Loading complexity levels...
  </span>
</div>

<form *ngIf="!loadingData" [formGroup]="parentForm">
  <p-dropdown 
    class="form-control multiselect"
    [options]="complexityLevels"
    optionValue="id"
    optionLabel="name"  
    formControlName="complexityLevelId"
    defaultLabel="select complexity level..."></p-dropdown>
</form>
