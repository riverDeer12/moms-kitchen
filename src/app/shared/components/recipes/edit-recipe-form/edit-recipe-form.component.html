<form>
  <div class="row">
    <div class="col-md-6 pr-1">
      <div class="form-group">
        <label>Is active</label>
        <input type="checkbox"  class="form-control">
      </div>
    </div>
  </div>
  <div class="row">
    <div class="col-md-6 pr-1">
      <div class="form-group">
        <label>Name</label>
        <input type="text" class="form-control" placeholder="enter recipe name here...">
      </div>
    </div>
  </div>
  <div class="row">
    <div class="col-md-6 pr-1">
      <div class="form-group">
        <label>Description</label>
        <input type="text" class="form-control" placeholder="enter recipe description here...">
      </div>
    </div>
  </div>
  <div class="row">
    <div class="col-md-6">
      <button type="submit" class="btn btn-primary btn-success">Save changes</button>
    </div>
  </div>
</form>
